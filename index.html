<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Tetris</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Tetris</h1>
  <div class="wrap">
    <canvas id="game" width="320" height="640" aria-label="Spielfeld"></canvas>
    <div class="side">
      <h2>Punkte</h2>
      <div class="stat" id="score">0</div>
      <h2>Level</h2>
      <div class="stat" id="level">1</div>
      <h2>Linien</h2>
      <div class="stat" id="lines">0</div>
      <h2>Nächstes</h2>
      <canvas id="next-canvas" width="120" height="120"></canvas>
      <div class="controls">
        <kbd>←</kbd><kbd>→</kbd> Bewegen &nbsp;
        <kbd>↓</kbd> Schneller<br />
        <kbd>↑</kbd> Drehen &nbsp;
        <kbd>Leertaste</kbd> Fallen<br />
        <kbd>P</kbd> Pause
      </div>
    </div>
  </div>
  <footer>Tetris im Browser · <code>index.html</code>, <code>styles.css</code>, <code>game.js</code> im gleichen Ordner (oder lokaler Server)</footer>

  <div id="overlay">
    <div class="card">
      <h2 id="overlay-title">Tetris</h2>
      <p id="overlay-msg">Steuere die Steine, fülle Reihen und sammle Punkte. Viel Erfolg!</p>
      <button type="button" id="start-btn">Spiel starten</button>
    </div>
  </div>

  <script src="game.js" defer></script>
</body>
</html>
